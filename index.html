<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apps-blueprints</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  font-family: 'Inter', system-ui, sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  padding: 48px 24px;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 760px; margin: 0 auto; }
.header { margin-bottom: 40px; }
.title { font-size: 22px; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
.sub   { font-size: 14px; color: #8b949e; }
.grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card  {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color .15s, background .15s;
}
.card:hover { border-color: #2F81F7; background: #1c2128; }
.card-badge {
  font-size: 10px;
  font-weight: 600;
  color: #2F81F7;
  background: rgba(47,129,247,.12);
  border: 1px solid rgba(47,129,247,.2);
  border-radius: 999px;
  padding: 2px 8px;
  width: fit-content;
}
.card-title { font-size: 14px; font-weight: 600; color: #e6edf3; }
.card-desc  { font-size: 12px; color: #8b949e; line-height: 1.5; }
.card-meta  { font-size: 11px; color: #484f58; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">apps-blueprints</div>
    <div class="sub">UI blueprints for design reference — open in Figma alongside</div>
  </div>
  <div class="grid">
    <a class="card" href="umbra-dashboard/">
      <span class="card-badge">Dashboard</span>
      <div class="card-title">Umbra Analytics</div>
      <div class="card-desc">2-screen dashboard: Overview (treemap + metrics) and Traffic Sources & Funnel. GitHub dark style, privacy-first analytics.</div>
      <div class="card-meta">2 screens · Chart.js · Inter</div>
    </a>
  </div>
</div>
</body>
</html>
